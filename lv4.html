<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //e18
        function square(num){
            return num * num;
        }
        console.log(square(5));
        //e19
        function larger(a,b){
            if(a<b){
                return b;
            }
            else{
                return a;
            }
        }
        console.log(larger(4,5));
        //e20
        let s = `abdh-1fa-3be-7oe`;
        let cnt = 0;
        for(let i = 0; i < s.length; i++){
            if(s[i] >= `0` && s[i] <= `9`){
                if(i >= 1 && s[i-1] == `-`){
                    cnt++;
                }
            }
        }
        console.log(cnt);
        //e21
        function check_string(word){
            for(let i = 0; i < word.length; i++){
                if(word[i] !== word[word.length-i-1]){
                    return false;
                }
            }
            return true;
        }
        console.log(check_string(`abccba`));
        //e22
        function fac(n){
            let res = 1;
            for(let i = n; i >= 1; i--){
                res *= i;
            }
            return res;
        }
        console.log(fac(5));
        //e23
        function randomInt(lower, upper) {
            return Math.floor(Math.random() * (upper - lower + 1)) + lower;
        }
        console.log(randomInt(15,35));
    </script>
</body>
</html>
