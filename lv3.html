<body>
    <script>
        //e11
        for(let i = 1; i <= 10; i++){
            console.log(i + ` `);
        }
        //e12
        for(let i = 1; i <= 10; i++){
            if(i%2==0){
                console.log(i);
            }
        }
        //e13
        let sum = 0;
        for(let i = 1; i <= 10; i++){
            sum += i;
        }
        console.log(sum);
        //e14
        let sochotruoc = 10;
        for(let i = 1; i <= 10; i++){
            let num = sochotruoc * i;
            console.log(num);
        }
        //e15
        let number = 12345;
        let cnt = 0;
        while(number > 0){
            cnt++;
            number = Math.floor(number / 10);
        }
        console.log(cnt);
        //e16
        let num = 1221;
        let x = num;
        let reverse = 0;
        while(num > 0){
            let du = num%10;
            num = Math.floor(num / 10);
            reverse = reverse * 10 + du;
        }
        console.log(reverse);
        //e17
        if(x == reverse){
            console.log(true);
        }
        else{
            console.log(false);
        }
    </script>
